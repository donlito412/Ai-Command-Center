name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './command-center/package.json'

      - name: Install Dependencies
        run: |
          if [ -d "command-center" ] && [ -f "command-center/package.json" ]; then
            cd command-center
            npm ci || npm install
          else
            echo "command-center folder or package.json not found, skipping dependency installation."
          fi

      - name: Build App
        run: |
          if [ -d "command-center" ] && [ -f "command-center/package.json" ]; then
            cd command-center
            npm run build
          else
            echo "command-center folder or package.json not found, skipping build."
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ai-command-center
          channelId: live
